name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # deploy-admin.yml
      - name: Deploy
        run: cd admin && flyctl deploy --remote-only -a suaagenda-admin
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}