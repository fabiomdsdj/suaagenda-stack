name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # deploy-landing.yml
      - name: Deploy
        run: cd landing && flyctl deploy --remote-only -a suaagenda-landing
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}