name: Deploy Master Admin

on:
  push:
    branches: [main]
    paths:
      - 'master-admin/**'
      - '.github/workflows/deploy-master.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # deploy-master.yml
      - name: Deploy
        run: cd master-admin && flyctl deploy --remote-only -a suaagenda-master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}