name: Deploy White Label

on:
  push:
    branches: [main]
    paths:
      - 'white-label/**'
      - '.github/workflows/deploy-wl.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only -a suaagenda-wl --config white-label/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}