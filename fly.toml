# fly.toml
app = 'suaagenda-stack'
primary_region = 'gru'

[build]
  [build.env]
    NUXT_PUBLIC_API_BASE_URL = "https://api.suaagenda.link"
    
[env]
  NODE_ENV = "production"
  NUXT_PUBLIC_API_BASE_URL = "https://api.suaagenda.link"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024  # 1GB pra começar, ajusta depois se precisar