worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # ✨ IMPORTANTE: Específicos PRIMEIRO
  
  # API
  server {
    listen 80;
    server_name api.suaagenda.link;
    
    location / {
      proxy_pass http://127.0.0.1:3010;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Admin
  server {
    listen 80;
    server_name admin.suaagenda.link;
    
    location / {
      proxy_pass http://127.0.0.1:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Master Admin
  server {
    listen 80;
    server_name master.suaagenda.link;
    
    location / {
      proxy_pass http://127.0.0.1:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Landing
  server {
    listen 80;
    server_name landing.suaagenda.link;
    
    location / {
      proxy_pass http://127.0.0.1:3004;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # App (específico também)
  server {
    listen 80;
    server_name app.suaagenda.link;
    
    location / {
      proxy_pass http://127.0.0.1:3003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Tenant-Subdomain $host;
    }
  }

  # ✨ WILDCARD - POR ÚLTIMO (captura o resto)
  server {
    listen 80;
    # Regex simples: qualquer coisa.suaagenda.link
    server_name ~^.+\.suaagenda\.link$;
    
    location / {
      proxy_pass http://127.0.0.1:3003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Tenant-Subdomain $host;
    }
  }
}